<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HBB Offering Hierarchy V3.1 — Digital Workplace Solutions</title>
<style>
  :root {
    --pcsd: #3d1f52;
    --mbg: #a78ab8;
    --shared: #2e4bb8;
    --bg: #f6f7fb;
    --panel: #ffffff;
    --border: #e4e6ef;
    --muted: #6b7280;
    --text: #1f2330;
    --accent: #2e4bb8;
    --hover: rgba(46, 75, 184, 0.08);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    background: #fff;
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  header h1 { font-size: 17px; margin: 0; color: #111; }
  header h1 span { color: var(--accent); font-weight: 600; }
  .legend { display: flex; gap: 8px; flex-wrap: wrap; }
  .legend-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--muted);
    padding: 3px 10px;
    border: 1px solid var(--border);
    border-radius: 999px;
    background: #fafbfe;
  }
  .legend-swatch { width: 11px; height: 11px; border-radius: 3px; }

  .layout {
    flex: 1;
    display: grid;
    grid-template-columns: 340px 1fr;
    gap: 0;
    min-height: 0;
  }
  .sidebar {
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .sidebar-top {
    padding: 14px 14px 10px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .sidebar-tree {
    flex: 1;
    overflow-y: auto;
    padding: 8px 6px 16px;
  }
  .main {
    overflow-y: auto;
    padding: 20px 26px;
    min-height: 0;
  }

  .search {
    width: 100%;
    padding: 8px 12px;
    font-size: 13px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: #fff;
    outline: none;
  }
  .search:focus { border-color: var(--accent); }
  .filter-section { margin-top: 10px; }
  .filter-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .chips { display: flex; flex-wrap: wrap; gap: 4px; }
  .chip-toggle {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 8px;
    font-size: 11px;
    border: 1px solid var(--border);
    border-radius: 999px;
    background: #fff;
    cursor: pointer;
    user-select: none;
    color: var(--muted);
    transition: all 0.12s;
  }
  .chip-toggle.on {
    background: #eef1fb;
    color: var(--accent);
    border-color: var(--accent);
  }
  .chip-toggle .dot {
    width: 8px; height: 8px; border-radius: 50%;
    display: inline-block;
  }
  .btn-row { display: flex; gap: 6px; margin-top: 10px; }
  .btn {
    flex: 1;
    padding: 5px 8px;
    font-size: 11px;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 5px;
    cursor: pointer;
    color: var(--text);
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }

  .tree-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    padding: 4px 10px 8px;
  }
  .tree-stats { font-size: 11px; color: var(--muted); padding: 0 10px 8px; }

  .node.hidden { display: none; }
  .node.closed > .children { display: none; }

  .tree-row {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 3px 6px 3px 4px;
    cursor: pointer;
    user-select: none;
    font-size: 13px;
    border-radius: 4px;
    line-height: 1.4;
  }
  .tree-row:hover { background: var(--hover); }
  .tree-row.selected {
    background: #e6eafb;
    color: var(--accent);
    font-weight: 600;
  }

  .arrow {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 14px;
    height: 14px;
    color: #8a8fa0;
    font-size: 9px;
    flex-shrink: 0;
    transition: transform 0.12s;
  }
  .node.closed > .tree-row .arrow { transform: rotate(-90deg); }
  .arrow-spacer { width: 14px; flex-shrink: 0; }

  .label {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .count {
    font-size: 10px;
    color: #9ca0b0;
    font-variant-numeric: tabular-nums;
    padding-left: 4px;
  }

  .l2-row .label { font-weight: 600; font-size: 13px; color: var(--accent); }
  .l3-row .label { font-weight: 500; font-size: 12.5px; }
  .l4-row .label { font-size: 12.5px; }

  .type-dot {
    width: 8px; height: 8px;
    border-radius: 2px;
    flex-shrink: 0;
  }
  .type-dot[data-type="PCSD"]   { background: var(--pcsd); }
  .type-dot[data-type="MBG"]    { background: var(--mbg); }
  .type-dot[data-type="Shared"] { background: var(--shared); }

  .indent-1 { padding-left: 12px; }
  .indent-2 { padding-left: 28px; }
  .indent-3 { padding-left: 46px; }

  .empty-note {
    font-size: 11px;
    color: var(--muted);
    font-style: italic;
    padding: 2px 0 2px 46px;
  }

  .main h2 {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin: 0 0 16px;
  }
  .detail-empty {
    color: var(--muted);
    font-size: 14px;
    padding: 40px 24px;
    text-align: center;
    border: 1px dashed var(--border);
    border-radius: 10px;
    background: #fff;
  }
  .detail-card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px 26px;
    max-width: 720px;
  }
  .detail-name {
    font-size: 24px;
    font-weight: 600;
    margin: 0 0 12px;
    line-height: 1.3;
  }
  .breadcrumb {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .breadcrumb .sep { margin: 0 8px; color: #c4c7d1; }
  .breadcrumb .crumb-l2 { color: var(--accent); font-weight: 500; }
  .breadcrumb .crumb-l4 { color: var(--text); font-weight: 600; }

  .meta-grid {
    display: grid;
    grid-template-columns: 140px 1fr;
    gap: 10px 16px;
    align-items: center;
    font-size: 13px;
  }
  .meta-grid .key { color: var(--muted); }

  .badge-type {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 12px;
    color: #fff;
    font-weight: 500;
  }
  .badge-type[data-type="PCSD"]   { background: var(--pcsd); }
  .badge-type[data-type="MBG"]    { background: var(--mbg); }
  .badge-type[data-type="Shared"] { background: var(--shared); }

  /* Right-pane group view (L2 / L3 selected) */
  .group-header {
    margin-bottom: 18px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }
  .group-title {
    font-size: 24px;
    font-weight: 600;
    margin: 0 0 6px;
    line-height: 1.25;
  }
  .group-sub {
    font-size: 13px;
    color: var(--muted);
  }
  .group-sub .crumb-l2 { color: var(--accent); font-weight: 500; }
  .group-sub .sep { margin: 0 6px; color: #c4c7d1; }

  .l3-section { margin-bottom: 22px; }
  .l3-section-head {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 8px;
  }
  .l3-section-head .name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }
  .l3-section-head .n {
    font-size: 11px;
    color: var(--muted);
  }

  .tile-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 8px;
  }
  .tile {
    padding: 10px 12px;
    border-radius: 6px;
    color: #fff;
    font-size: 12.5px;
    font-weight: 500;
    cursor: pointer;
    min-height: 48px;
    display: flex;
    align-items: center;
    line-height: 1.3;
    border: 2px solid transparent;
    transition: transform 0.1s, box-shadow 0.15s;
  }
  .tile:hover { transform: translateY(-1px); box-shadow: 0 4px 10px rgba(0,0,0,0.12); }
  .tile[data-type="PCSD"]   { background: var(--pcsd); }
  .tile[data-type="MBG"]    { background: var(--mbg); }
  .tile[data-type="Shared"] { background: var(--shared); }

  .empty-tile {
    padding: 12px;
    font-size: 12px;
    color: var(--muted);
    font-style: italic;
    background: #fafbfe;
    border: 1px dashed var(--border);
    border-radius: 6px;
  }

  .sidebar-tree::-webkit-scrollbar, .main::-webkit-scrollbar { width: 8px; }
  .sidebar-tree::-webkit-scrollbar-thumb, .main::-webkit-scrollbar-thumb {
    background: #d7dae5; border-radius: 4px;
  }

  @media (max-width: 820px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { border-right: none; border-bottom: 1px solid var(--border); max-height: 50vh; }
  }
</style>
</head>
<body>

<header>
  <h1>HBB Offering Hierarchy <span>V3.1 — Digital Workplace Solutions (DWS)</span></h1>
  <div class="legend">
    <span class="legend-chip"><span class="legend-swatch" style="background: var(--pcsd);"></span>PCSD</span>
    <span class="legend-chip"><span class="legend-swatch" style="background: var(--mbg);"></span>MBG</span>
    <span class="legend-chip"><span class="legend-swatch" style="background: var(--shared);"></span>Shared</span>
  </div>
</header>

<div class="layout">

  <aside class="sidebar">
    <div class="sidebar-top">
      <input id="search" class="search" type="text" placeholder="Search offerings…" autocomplete="off" />

      <div class="filter-section">
        <div class="filter-label">Type</div>
        <div class="chips" id="type-filters"></div>
      </div>

      <div class="filter-section">
        <div class="filter-label">L2 Category</div>
        <div class="chips" id="l2-filters"></div>
      </div>

      <div class="btn-row">
        <button class="btn" id="expand-all">Expand all</button>
        <button class="btn" id="collapse-all">Collapse all</button>
      </div>
    </div>

    <div class="sidebar-tree">
      <div class="tree-title">Hierarchy</div>
      <div class="tree-stats" id="stats"></div>
      <div id="tree"></div>
    </div>
  </aside>

  <main class="main">
    <h2>Selected Offering</h2>
    <div id="detail-body">
      <div class="detail-empty">
        Click an item in the left navigation to see its details.<br/>
        Use the chevrons ▶/▼ to expand or collapse categories.
      </div>
    </div>
  </main>

</div>

const L2_ORDER = ["Managed & Professional Services", "Software & Cloud Services", "DaaS HW"];
const L3_ORDER = [
  "Advisory & Planning",
  "Persona based Configuration & Experience",
  "Collaboration & Productivity",
  "Security Services",
  "Service Desk",
  "Field Service",
  "Lifecycle Services",
  "Unified Endpoint Management",
  "Global Smart Support Solutions",
  "NEC Managed",
  "Support Contracts",
  "ThinkShield Security",
  "Core Software",
  "CSP",
  "ThinkShield for Mobile",
  "Lenovo HW",
  "3PO HW",
];
const TYPES = ["PCSD", "MBG", "Shared"];
const TYPE_LABEL = { PCSD: "Dedicated PCSD", MBG: "Dedicated MBG", Shared: "Shared" };

// ---------- State ----------
// selected shape: { level: "L2"|"L3"|"L4", l2, l3?, l4?, type? }
const state = {
  search: "",
  types: new Set(TYPES),
  l2s: new Set(L2_ORDER),
  selected: null,
};

// ---------- Build hierarchy ----------
function buildTree(data) {
  const tree = {};
  for (const row of data) {
    if (!tree[row.l2]) tree[row.l2] = {};
    if (!tree[row.l2][row.l3]) tree[row.l2][row.l3] = [];
    if (row.l4) tree[row.l2][row.l3].push(row);
  }
  return tree;
}
const TREE = buildTree(DATA);

// ---------- Render sidebar filters ----------
function renderFilters() {
  const typeBox = document.getElementById("type-filters");
  typeBox.innerHTML = "";
  for (const t of TYPES) {
    const count = DATA.filter(d => d.l4 && d.type === t).length;
    const b = document.createElement("button");
    b.className = "chip-toggle on";
    b.dataset.type = t;
    b.innerHTML = `<span class="dot" style="background: var(--${t.toLowerCase()});"></span>${TYPE_LABEL[t]} (${count})`;
    typeBox.appendChild(b);
  }

  const l2Box = document.getElementById("l2-filters");
  l2Box.innerHTML = "";
  for (const l2 of L2_ORDER) {
    const count = DATA.filter(d => d.l4 && d.l2 === l2).length;
    const b = document.createElement("button");
    b.className = "chip-toggle on";
    b.dataset.l2 = l2;
    b.textContent = `${l2} (${count})`;
    l2Box.appendChild(b);
  }
}

// ---------- Render tree ----------
function esc(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[c]
  );
}

function renderTree() {
  const root = document.getElementById("tree");
  root.innerHTML = "";
  for (const l2 of L2_ORDER) {
    if (!TREE[l2]) continue;
    const l2Node = document.createElement("div");
    l2Node.className = "node l2-node";
    l2Node.dataset.l2 = l2;

    const l3Names = Object.keys(TREE[l2]).sort((a, b) => L3_ORDER.indexOf(a) - L3_ORDER.indexOf(b));
    const l2Count = l3Names.reduce((sum, l3) => sum + TREE[l2][l3].length, 0);

    const l2Row = document.createElement("div");
    l2Row.className = "tree-row l2-row indent-1";
    l2Row.innerHTML = `
      <span class="arrow">▼</span>
      <span class="label">${esc(l2)}</span>
      <span class="count">${l2Count}</span>
    `;
    l2Node.appendChild(l2Row);

    const l2Children = document.createElement("div");
    l2Children.className = "children";

    for (const l3 of l3Names) {
      const l3Items = TREE[l2][l3];
      const l3Node = document.createElement("div");
      l3Node.className = "node l3-node";
      l3Node.dataset.l3 = l3;
      if (l3Items.length === 0) l3Node.dataset.empty = "true";

      const l3Row = document.createElement("div");
      l3Row.className = "tree-row l3-row indent-2";
      l3Row.innerHTML = `
        <span class="arrow">▼</span>
        <span class="label">${esc(l3)}</span>
        <span class="count">${l3Items.length}</span>
      `;
      l3Node.appendChild(l3Row);

      const l3Children = document.createElement("div");
      l3Children.className = "children";

      if (l3Items.length === 0) {
        const empty = document.createElement("div");
        empty.className = "empty-note";
        empty.textContent = "(no offerings listed)";
        l3Children.appendChild(empty);
      } else {
        for (const item of l3Items) {
          const row = document.createElement("div");
          row.className = "tree-row l4-row indent-3";
          row.dataset.type = item.type;
          row.dataset.l4 = item.l4;
          row.dataset.l3 = item.l3;
          row.dataset.l2 = item.l2;
          row.innerHTML = `
            <span class="arrow-spacer"></span>
            <span class="type-dot" data-type="${item.type}"></span>
            <span class="label">${esc(item.l4)}</span>
          `;
          l3Children.appendChild(row);
        }
      }

      l3Node.appendChild(l3Children);
      l2Children.appendChild(l3Node);
    }

    l2Node.appendChild(l2Children);
    root.appendChild(l2Node);
  }
}

// ---------- Filters ----------
function matchesSearch(item, q) {
  if (!q) return true;
  const needle = q.toLowerCase();
  return (
    item.l4.toLowerCase().includes(needle) ||
    item.l3.toLowerCase().includes(needle) ||
    item.l2.toLowerCase().includes(needle)
  );
}

function applyFilters() {
  const q = state.search.trim();
  let visibleTotal = 0;

  const l2Nodes = document.querySelectorAll(".l2-node");
  for (const l2Node of l2Nodes) {
    const l2 = l2Node.dataset.l2;
    const l2Pass = state.l2s.has(l2);
    let l2HasVisible = false;

    const l3Nodes = l2Node.querySelectorAll(".l3-node");
    for (const l3Node of l3Nodes) {
      let l3HasVisible = false;
      const rows = l3Node.querySelectorAll(".l4-row");
      for (const row of rows) {
        const type = row.dataset.type;
        const item = {
          l2: row.dataset.l2,
          l3: row.dataset.l3,
          l4: row.dataset.l4,
        };
        const pass =
          l2Pass &&
          state.types.has(type) &&
          matchesSearch(item, q);

        row.classList.toggle("hidden", !pass);
        if (pass) {
          l3HasVisible = true;
          visibleTotal++;
        }
      }

      // Empty L3 (no L4 items) stays visible if its L2 is enabled and there's no active search
      const isEmpty = l3Node.dataset.empty === "true";
      const keepEmpty = isEmpty && l2Pass && !q;

      l3Node.classList.toggle("hidden", !l3HasVisible && !keepEmpty);
      if (l3HasVisible || keepEmpty) l2HasVisible = true;
      if (q && l3HasVisible) l3Node.classList.remove("closed");
    }

    l2Node.classList.toggle("hidden", !l2HasVisible);
    if (q && l2HasVisible) l2Node.classList.remove("closed");
  }

  document.getElementById("stats").textContent =
    visibleTotal + " / " + DATA.filter(d => d.l4).length + " offerings visible";
}

// ---------- Detail pane ----------
function tileHTML(item) {
  return `<div class="tile" data-type="${item.type}" data-l2="${esc(item.l2)}" data-l3="${esc(item.l3)}" data-l4="${esc(item.l4)}">${esc(item.l4)}</div>`;
}

function renderL4Detail(sel) {
  return `
    <div class="detail-card">
      <div class="detail-name">${esc(sel.l4)}</div>
      <div class="breadcrumb">
        <span class="crumb-l2">${esc(sel.l2)}</span>
        <span class="sep">›</span>
        <span>${esc(sel.l3)}</span>
        <span class="sep">›</span>
        <span class="crumb-l4">${esc(sel.l4)}</span>
      </div>
      <div class="meta-grid">
        <span class="key">Ownership type</span>
        <span><span class="badge-type" data-type="${sel.type}">${TYPE_LABEL[sel.type]}</span></span>

        <span class="key">L2 Category</span>
        <span>${esc(sel.l2)}</span>

        <span class="key">L3 Domain</span>
        <span>${esc(sel.l3)}</span>

        <span class="key">L4 Offering</span>
        <span>${esc(sel.l4)}</span>
      </div>
    </div>
  `;
}

function renderL3View(sel) {
  const items = (TREE[sel.l2] && TREE[sel.l2][sel.l3]) || [];
  const tiles = items.length
    ? `<div class="tile-grid">${items.map(tileHTML).join("")}</div>`
    : `<div class="empty-tile">No offerings listed under this category.</div>`;
  return `
    <div class="group-header">
      <h3 class="group-title">${esc(sel.l3)}</h3>
      <div class="group-sub">
        <span class="crumb-l2">${esc(sel.l2)}</span>
        <span class="sep">›</span>
        <span>${esc(sel.l3)}</span>
        <span class="sep">·</span>
        <span>${items.length} offering${items.length === 1 ? "" : "s"}</span>
      </div>
    </div>
    ${tiles}
  `;
}

function renderL2View(sel) {
  const l3Map = TREE[sel.l2] || {};
  const l3Names = Object.keys(l3Map).sort((a, b) => L3_ORDER.indexOf(a) - L3_ORDER.indexOf(b));
  const totalItems = l3Names.reduce((s, n) => s + l3Map[n].length, 0);
  const sections = l3Names.map(l3 => {
    const items = l3Map[l3];
    const tiles = items.length
      ? `<div class="tile-grid">${items.map(tileHTML).join("")}</div>`
      : `<div class="empty-tile">No offerings listed under this category.</div>`;
    return `
      <div class="l3-section">
        <div class="l3-section-head">
          <span class="name">${esc(l3)}</span>
          <span class="n">${items.length}</span>
        </div>
        ${tiles}
      </div>
    `;
  }).join("");
  return `
    <div class="group-header">
      <h3 class="group-title">${esc(sel.l2)}</h3>
      <div class="group-sub">
        <span>${l3Names.length} categor${l3Names.length === 1 ? "y" : "ies"}</span>
        <span class="sep">·</span>
        <span>${totalItems} offering${totalItems === 1 ? "" : "s"}</span>
      </div>
    </div>
    ${sections}
  `;
}

function renderDetail() {
  const body = document.getElementById("detail-body");
  const sel = state.selected;
  if (!sel) {
    body.innerHTML = `<div class="detail-empty">
      Click a category or offering in the left navigation.<br/>
      The chevron ▶/▼ toggles expand/collapse; the label shows its contents here.
    </div>`;
    return;
  }
  if (sel.level === "L4") body.innerHTML = renderL4Detail(sel);
  else if (sel.level === "L3") body.innerHTML = renderL3View(sel);
  else body.innerHTML = renderL2View(sel);
}

// ---------- Wire up ----------
function wire() {
  document.getElementById("search").addEventListener("input", (e) => {
    state.search = e.target.value;
    applyFilters();
  });

  const toggleChip = (btn, collection, key) => {
    const v = btn.dataset[key];
    if (!v) return;
    const on = btn.classList.toggle("on");
    if (on) collection.add(v); else collection.delete(v);
    applyFilters();
  };

  document.getElementById("type-filters").addEventListener("click", (e) => {
    const btn = e.target.closest(".chip-toggle");
    if (btn) toggleChip(btn, state.types, "type");
  });
  document.getElementById("l2-filters").addEventListener("click", (e) => {
    const btn = e.target.closest(".chip-toggle");
    if (btn) toggleChip(btn, state.l2s, "l2");
  });

  document.getElementById("expand-all").addEventListener("click", () => {
    document.querySelectorAll(".node").forEach(n => n.classList.remove("closed"));
  });
  document.getElementById("collapse-all").addEventListener("click", () => {
    document.querySelectorAll(".node").forEach(n => n.classList.add("closed"));
  });

  const selectNode = (row, sel) => {
    document.querySelectorAll(".tree-row.selected").forEach(r => r.classList.remove("selected"));
    row.classList.add("selected");
    state.selected = sel;
    renderDetail();
  };

  document.getElementById("tree").addEventListener("click", (e) => {
    // Arrow click → toggle collapse only
    const arrow = e.target.closest(".arrow");
    if (arrow) {
      const row = arrow.closest(".tree-row");
      const node = row && row.parentElement;
      if (node && (node.classList.contains("l2-node") || node.classList.contains("l3-node"))) {
        node.classList.toggle("closed");
        return;
      }
    }

    // L4 click → select and show detail
    const l4 = e.target.closest(".l4-row");
    if (l4) {
      selectNode(l4, {
        level: "L4",
        l2: l4.dataset.l2,
        l3: l4.dataset.l3,
        l4: l4.dataset.l4,
        type: l4.dataset.type,
      });
      return;
    }

    // L3 row click (not arrow) → select and show grid in right pane
    const l3 = e.target.closest(".l3-row");
    if (l3) {
      const node = l3.parentElement;
      node.classList.remove("closed"); // auto-expand on select
      selectNode(l3, {
        level: "L3",
        l2: l3.closest(".l2-node").dataset.l2,
        l3: node.dataset.l3,
      });
      return;
    }

    // L2 row click (not arrow) → select and show grouped view
    const l2 = e.target.closest(".l2-row");
    if (l2) {
      const node = l2.parentElement;
      node.classList.remove("closed"); // auto-expand on select
      selectNode(l2, {
        level: "L2",
        l2: node.dataset.l2,
      });
      return;
    }
  });

  // Clicking a tile in the right pane drills down to L4 detail
  document.getElementById("detail-body").addEventListener("click", (e) => {
    const tile = e.target.closest(".tile");
    if (!tile) return;
    const l2 = tile.dataset.l2, l3 = tile.dataset.l3, l4 = tile.dataset.l4;
    const item = DATA.find(d => d.l2 === l2 && d.l3 === l3 && d.l4 === l4);
    if (!item) return;
    // Also highlight the matching L4 row in the tree (and expand ancestors)
    const treeRow = document.querySelector(`.l4-row[data-l2="${CSS.escape(l2)}"][data-l3="${CSS.escape(l3)}"][data-l4="${CSS.escape(l4)}"]`);
    if (treeRow) {
      treeRow.closest(".l2-node").classList.remove("closed");
      treeRow.closest(".l3-node").classList.remove("closed");
      document.querySelectorAll(".tree-row.selected").forEach(r => r.classList.remove("selected"));
      treeRow.classList.add("selected");
      treeRow.scrollIntoView({ block: "nearest" });
    }
    state.selected = { level: "L4", l2: item.l2, l3: item.l3, l4: item.l4, type: item.type };
    renderDetail();
  });
}

// ---------- Init ----------
renderFilters();
renderTree();
applyFilters();
wire();
</script>

</body>
</html>
